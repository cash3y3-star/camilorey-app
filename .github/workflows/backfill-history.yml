name: Backfill player history

# Corre cada 30 min (a los :15/:45, para no coincidir con sync.yml que
# corre a los :00/:30) además de poder dispararse a mano. Cada corrida
# es rápida en estado estable: solo completa torneos que todavía no
# tengamos para jugadores con un pick pendiente — el trabajo pesado
# real solo pasa la primera vez que aparece un jugador nuevo.
on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:

# Igual que sync.yml: si una corrida se demora, que la siguiente
# espere en vez de pisarse con torneos/jugadores a medio guardar.
concurrency:
  group: backfill-camilorey
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backfill-history.js
