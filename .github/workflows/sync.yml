name: Sync CAMILOREY picks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Con el cronjob externo disparando cada pocos minutos, una corrida
# lenta (npm install + varios torneos) se puede topar con la
# siguiente. Esto hace que la nueva espere a que termine la anterior
# en vez de correr las dos en paralelo y pisarse escrituras.
concurrency:
  group: sync-camilorey
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PRUEBA TEMPORAL 2026-07-20 — solo para confirmar si AiScore
      # bloquea las IPs de GitHub Actions (como ya nos pasó con
      # Sofascore) antes de invertir en construir un scraper. Se saca
      # apenas se tenga la respuesta, sea cual sea. continue-on-error
      # para que esto NUNCA le pegue al sync real si algo sale mal acá.
      # No se puede leer el log de este step sin permisos de admin del
      # repo (API de GitHub), así que el resultado se escribe a un
      # archivo y se pushea al repo — así se lee después con un simple
      # git pull / raw.githubusercontent.com, sin necesitar token.
      - name: Prueba temporal — alcance de AiScore desde Actions
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept-Language: en-US,en;q=0.9" \
            "https://m.aiscore.com/fr/table-tennis/match-milan-travnik-karel-pesek/vmqyosvl9l0ugk9/h2h")
          echo "AISCORE_HTTP_STATUS=$STATUS" > aiscore-test-result.txt
          cat aiscore-test-result.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add aiscore-test-result.txt
          # Sin timestamp adentro del archivo a propósito: mismo
          # resultado corrida tras corrida = sin diff = sin commit. Si
          # no, con este workflow disparándose cada ~60s se llenaría el
          # repo de un commit por minuto. --cached porque recién se
          # hizo git add (un archivo nuevo sin trackear no aparece en
          # "git diff" a secas).
          if ! git diff --cached --quiet; then
            git commit -m "Resultado prueba AiScore (temporal): $STATUS"
            git push || echo "no se pudo pushear (permisos del token) — revisar a mano"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # No hay package-lock.json (nunca se generó uno, este repo no
      # corre npm localmente), así que el cache de actions/setup-node
      # (que necesita un lockfile para la key) no sirve acá — se cachea
      # node_modules a mano por hash de package.json. Sin esto, "npm
      # install" (con @imgly/background-removal-node, que trae modelos
      # ONNX pesados) tardaba lo bastante como para que, con el
      # cronjob externo disparando cada ~60s, una corrida de cada tres
      # llegara a cancelarse en la cola antes de arrancar (ver
      # concurrency arriba) — no perdía datos (cancel-in-progress:false
      # protege a la que ya está corriendo), pero desperdiciaba minutos
      # de Actions en vano.
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/sync.js
