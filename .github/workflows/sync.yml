name: Sync CAMILOREY picks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Con el cronjob externo disparando cada pocos minutos, una corrida
# lenta (npm install + varios torneos) se puede topar con la
# siguiente. Esto hace que la nueva espere a que termine la anterior
# en vez de correr las dos en paralelo y pisarse escrituras.
concurrency:
  group: sync-camilorey
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # No hay package-lock.json (nunca se generó uno, este repo no
      # corre npm localmente), así que el cache de actions/setup-node
      # (que necesita un lockfile para la key) no sirve acá — se cachea
      # node_modules a mano por hash de package.json. Sin esto, "npm
      # install" (con @imgly/background-removal-node, que trae modelos
      # ONNX pesados) tardaba lo bastante como para que, con el
      # cronjob externo disparando cada ~60s, una corrida de cada tres
      # llegara a cancelarse en la cola antes de arrancar (ver
      # concurrency arriba) — no perdía datos (cancel-in-progress:false
      # protege a la que ya está corriendo), pero desperdiciaba minutos
      # de Actions en vano.
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/sync.js
