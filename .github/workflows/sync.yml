name: Sync CAMILOREY picks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: "curl -f -X GET https://camilorey-tt-app.vercel.app/api/cron/sync -H \"Authorization: Bearer ${{ secrets.CRON_SECRET }}\""
