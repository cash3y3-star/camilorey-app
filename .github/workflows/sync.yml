name: Sync CAMILOREY picks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Con el cronjob externo disparando cada pocos minutos, una corrida
# lenta (npm install + varios torneos) se puede topar con la
# siguiente. Esto hace que la nueva espere a que termine la anterior
# en vez de correr las dos en paralelo y pisarse escrituras.
concurrency:
  group: sync-camilorey
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync.js
